            { id: "santuario-tereza", title: "Santuário Santa Tereza", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800", desc: "Piscina natural de águas cristalinas rodeada de uma deslumbrante e silenciosa mata preservada.", time: "Dia Inteiro", icon: "fa-dove", color: "from-teal-500 to-teal-700", lat: -9.3100, lng: -35.4100 }
        ];

        // Lógica de Ordenação
        const getWeight = (time) => {
            const t = time.toLowerCase();
            if (t.includes('manhã')) return 1;
            if (t.includes('dia inteiro')) return 1;
            if (t.includes('almoço')) return 2;
            if (t.includes('tarde')) return 3;
            if (t.includes('fim de tarde')) return 4;
            if (t.includes('noite')) return 5;
            if (t.includes('jantar')) return 6;
            return 10;
        };

        const App = () => {
            // Inicializar estado a partir da Local Storage (ou estado vazio por defeito)
            const [itinerary, setItinerary] = useState(() => {
                const savedData = localStorage.getItem('maceioRoteiroData');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        return parsed.itinerary || { dia1: [], dia2: [], dia3: [], dia4: [] };
                    } catch (e) {
                        return { dia1: [], dia2: [], dia3: [], dia4: [] };
                    }
                }
                return { dia1: [], dia2: [], dia3: [], dia4: [] };
            });

            const [activeTab, setActiveTab] = useState('catalogo');
            
            // Estado para os Modais e Toasts
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [clearModalOpen, setClearModalOpen] = useState(false);
            const [removeModal, setRemoveModal] = useState({ show: false, spotId: null, dayId: null });
            const [mapModal, setMapModal] = useState({ show: false, spot: null });

            // Estado para PWA Banner
            const [pwaBanner, setPwaBanner] = useState({ show: false, mode: null, deferredPrompt: null });

            // Salvar na localStorage sempre que itinerary mudar
            useEffect(() => {
                localStorage.setItem('maceioRoteiroData', JSON.stringify({ itinerary }));
            }, [itinerary]);

            // Mostrar Toast helper
            const showToastMessage = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            // Adicionar Passeio
            const addToDay = (spotId, dayId) => {
                if (itinerary[dayId].some(s => s.id === spotId)) return;
                
                const spot = allSpots.find(s => s.id === spotId);
                if (spot) {
                    setItinerary(prev => {
                        const newDayList = [...prev[dayId], { ...spot }];
                        newDayList.sort((a, b) => getWeight(a.time) - getWeight(b.time));
                        return { ...prev, [dayId]: newDayList };
                    });
                    const numeroDia = dayId.replace('dia', '');
                    showToastMessage(`Adicionado ao Dia ${numeroDia}!`);
                }
            };

            // Remover Passeio (Solicitação)
            const requestRemoveFromDay = (spotId, dayId) => {
                setRemoveModal({ show: true, spotId, dayId });
            };

            // Remover Passeio (Confirmação)
            const confirmRemoveFromDay = () => {
                const { spotId, dayId } = removeModal;
                setItinerary(prev => {
                    const newDayList = prev[dayId].filter(s => s.id !== spotId);
                    return { ...prev, [dayId]: newDayList };
                });
                setRemoveModal({ show: false, spotId: null, dayId: null });
                showToastMessage('Removido do roteiro.', 'error');
            };

            // Confirmar Limpeza
            const confirmClearItinerary = () => {
                setItinerary({ dia1: [], dia2: [], dia3: [], dia4: [] });
                setClearModalOpen(false);
                showToastMessage('O roteiro foi limpo.', 'error');
                setActiveTab('catalogo');
            };

            // Sortear Aleatório
            const generateRandomItinerary = () => {
                const isLunch = (s) => s.time === 'Almoço';
                const isDinner = (s) => s.time === 'Jantar';
                const isActivity = (s) => !isLunch(s) && !isDinner(s);

                let allLunchSpots = allSpots.filter(isLunch);
                let allDinnerSpots = allSpots.filter(isDinner);
                
                let activitySpots = [...allSpots.filter(isActivity)].sort(() => Math.random() - 0.5); // Shuffle
                
                const totalDays = ['dia1', 'dia2', 'dia3', 'dia4'];
                let newItinerary = { dia1: [], dia2: [], dia3: [], dia4: [] };

                totalDays.forEach(day => {
                    const act = activitySpots.pop();
                    const lun = allLunchSpots[Math.floor(Math.random() * allLunchSpots.length)];
                    const din = allDinnerSpots[Math.floor(Math.random() * allDinnerSpots.length)];
                    
                    let dayItems = [act, lun, din].filter(Boolean);
                    dayItems.sort((a, b) => getWeight(a.time) - getWeight(b.time));
                    newItinerary[day].push(...dayItems);
                });

                setItinerary(newItinerary);
                setActiveTab('dia1');
                showToastMessage('Roteiro mágico gerado com sucesso!');
                document.getElementById('planeador').scrollIntoView({ behavior: 'smooth' });
            };

            // --- Lógica do PWA ---
            useEffect(() => {
                const handler = (e) => {
                    e.preventDefault();
                    if (!localStorage.getItem('pwaMaceioDismissed')) {
                        setPwaBanner(prev => ({ ...prev, show: true, deferredPrompt: e }));
                    }
                };
                window.addEventListener('beforeinstallprompt', handler);

                // Checar standalone após 3 segs
                const timer = setTimeout(() => {
                    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                    if (!isStandalone && !localStorage.getItem('pwaMaceioDismissed')) {
                        setPwaBanner(prev => ({ ...prev, show: true }));
                    }
                }, 3000);

                return () => {
                    window.removeEventListener('beforeinstallprompt', handler);
                    clearTimeout(timer);
                };
            }, []);

            const dismissPWA = () => {
                setPwaBanner(prev => ({ ...prev, show: false }));
                localStorage.setItem('pwaMaceioDismissed', 'true');
            };

            const handleInstall = async () => {
                if (pwaBanner.deferredPrompt) {
                    pwaBanner.deferredPrompt.prompt();
                    const { outcome } = await pwaBanner.deferredPrompt.userChoice;
                    if (outcome === 'accepted') dismissPWA();
                    setPwaBanner(prev => ({ ...prev, deferredPrompt: null }));
                } else {
                    const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
                    setPwaBanner(prev => ({ ...prev, mode: isIos ? 'ios' : 'android' }));
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="hero-bg h-[50vh] md:h-[60vh] flex items-center justify-center relative overflow-hidden">
                        <div className="text-center text-white px-4 z-10 w-full max-w-4xl">
                            <div className="inline-block mb-4 px-5 py-2 rounded-full border border-white/30 backdrop-blur-md bg-white/10 shadow-lg">
                                <span className="uppercase tracking-[0.2em] md:tracking-[0.3em] text-xs md:text-sm font-semibold text-sand">Personalize a sua Viagem</span>
                            </div>
                            <h1 className="font-serif text-5xl md:text-7xl font-bold mb-2 text-shadow-lg leading-tight">Maceió <br/><span className="text-3xl md:text-5xl text-ocean-light italic block mt-2">O Seu Roteiro Perfeito</span></h1>
                        </div>
                        <div className="absolute bottom-0 left-0 w-full overflow-hidden leading-none z-20">
                            <svg className="relative block w-full h-[40px] md:h-[100px]" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,123.63,192.27,108.86,236.4,98.66,280.4,76.51,321.39,56.44Z" fill="url(#wave-gradient)"></path>
                                <defs>
                                    <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" stopColor="#f8fafc" />
                                        <stop offset="100%" stopColor="#e0f2fe" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main id="planeador" className="container mx-auto px-4 py-8 md:py-16 max-w-6xl relative z-30 flex-grow">
                        
                        {/* Navigation Tabs */}
                        <div className="relative bg-white/60 backdrop-blur-md border-b border-slate-200 py-3 px-4 -mx-4 md:px-8 md:-mx-8 mb-8 md:mb-12 flex flex-wrap justify-center gap-2 md:gap-3 items-center transition-all">
                            <button onClick={() => setActiveTab('catalogo')} className={`tab-btn glass-tab px-4 py-2 md:px-6 md:py-3 rounded-full font-medium text-sm md:text-base transition-all duration-300 flex items-center gap-2 shadow-sm ${activeTab === 'catalogo' ? 'tab-active' : 'text-slate-700'}`}>
                                <i className="fas fa-map-marked-alt text-base md:text-lg"></i> <span className="hidden sm:inline">Pontos Turísticos</span><span className="sm:hidden">Catálogo</span>
                            </button>
                            {['dia1', 'dia2', 'dia3', 'dia4'].map(day => (
                                <button key={day} onClick={() => setActiveTab(day)} className={`tab-btn glass-tab px-4 py-2 md:px-6 md:py-3 rounded-full font-medium text-sm md:text-base transition-all duration-300 flex items-center gap-2 shadow-sm ${activeTab === day ? 'tab-active' : 'text-slate-700'}`}>
                                    Dia {day.replace('dia', '')} 
                                    {itinerary[day].length > 0 && (
                                        <span className={`text-[10px] md:text-xs px-2 py-0.5 rounded-full ${activeTab === day ? 'bg-white text-ocean' : 'bg-ocean text-white'}`}>{itinerary[day].length}</span>
                                    )}
                                </button>
                            ))}
                        </div>

                        {/* Content Area */}
                        <div className="relative min-h-[400px] md:min-h-[500px]">
                            
                            {/* Catalog View */}
                            {activeTab === 'catalogo' && (
                                <div className="fade-in">
                                    <div className="flex flex-col lg:flex-row justify-between items-center mb-8 md:mb-10 bg-white/60 backdrop-blur-md p-5 md:p-6 rounded-3xl border border-white shadow-sm gap-5 md:gap-6">
                                        <div className="text-center lg:text-left">
                                            <h2 className="text-2xl md:text-3xl font-serif font-bold text-slate-800">Escolha os seus Passeios</h2>
                                            <p className="text-slate-500 text-sm md:text-base mt-1 md:mt-2">Adicione os locais aos dias desejados.</p>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                                            <button onClick={() => {
                                                const isEmpty = Object.values(itinerary).every(day => day.length === 0);
                                                if (!isEmpty) setClearModalOpen(true);
                                            }} className="flex-1 lg:flex-none inline-flex justify-center items-center gap-2 bg-white text-red-500 border border-red-100 font-medium py-2.5 md:py-3 px-6 rounded-full hover:bg-red-50 hover:border-red-200 transition-all duration-300 shadow-sm transform hover:-translate-y-1 text-sm md:text-base">
                                                <i className="fas fa-trash-alt"></i> Limpar Tudo
                                            </button>
                                            <button onClick={generateRandomItinerary} className="flex-1 lg:flex-none inline-flex justify-center items-center gap-2 bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold py-2.5 md:py-3 px-6 rounded-full hover:from-purple-400 hover:to-indigo-500 transition-all duration-300 shadow-[0_8px_15px_rgba(99,102,241,0.3)] hover:shadow-[0_12px_20px_rgba(99,102,241,0.4)] transform hover:-translate-y-1 text-sm md:text-base">
                                                <i className="fas fa-magic"></i> Estou com Sorte!
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                        {allSpots.map(spot => (
                                            <div key={spot.id} className="bg-white rounded-2xl md:rounded-3xl shadow-xl hover:shadow-2xl overflow-hidden card-hover border border-white flex flex-col h-full fade-in">
                                                <div className="relative h-44 md:h-48 overflow-hidden group">
                                                    <img src={spot.img} className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" alt={spot.title} />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                                                    <div className="absolute top-3 left-3 bg-white/95 backdrop-blur-sm px-2.5 py-1 rounded-full text-[10px] md:text-xs font-bold text-slate-700 shadow-md flex items-center gap-1">
                                                        <i className="far fa-clock"></i> {spot.time}
                                                    </div>
                                                    <button onClick={() => setMapModal({ show: true, spot })} title="Ver no Mapa" className="absolute top-3 right-3 bg-white/90 backdrop-blur-sm text-ocean hover:text-white w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center hover:bg-ocean transition-colors shadow-lg z-20">
                                                        <i className="fas fa-map-marker-alt text-sm md:text-base"></i>
                                                    </button>
                                                    <h3 className="absolute bottom-3 left-4 right-4 text-lg md:text-xl font-bold text-white text-shadow-sm leading-tight pr-10 md:pr-12">{spot.title}</h3>
                                                </div>
                                                <div className="p-4 md:p-5 flex-grow flex flex-col justify-between bg-white">
                                                    <p className="text-slate-500 text-xs md:text-sm mb-4 md:mb-5 line-clamp-3">{spot.desc}</p>
                                                    <div className="mt-auto">
                                                        <p className="text-[10px] md:text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 md:mb-3 text-center">Gestão no Roteiro:</p>
                                                        <div className="grid grid-cols-4 md:grid-cols-2 gap-1.5 md:gap-2">
                                                            {['dia1', 'dia2', 'dia3', 'dia4'].map(day => {
                                                                const isAdded = itinerary[day].some(s => s.id === spot.id);
                                                                const dayNum = day.replace('dia', '');
                                                                
                                                                if (isAdded) {
                                                                    return (
                                                                        <button key={day} onClick={() => requestRemoveFromDay(spot.id, day)} className="bg-emerald-500 hover:bg-emerald-600 text-white border border-transparent text-xs md:text-sm py-2 rounded-lg md:rounded-xl transition-all font-medium flex items-center justify-center md:gap-1.5 shadow-sm" title={`Remover do Dia ${dayNum}`}>
                                                                            <span className="md:hidden"><i className="fas fa-check"></i></span>
                                                                            <span className="hidden md:inline"><i className="fas fa-check text-xs"></i> Dia {dayNum}</span>
                                                                        </button>
                                                                    );
                                                                } else {
                                                                    return (
                                                                        <button key={day} onClick={() => addToDay(spot.id, day)} className="bg-slate-50 hover:bg-ocean hover:text-white border border-slate-100 hover:border-transparent text-slate-700 text-xs md:text-sm py-2 rounded-lg md:rounded-xl transition-all font-medium flex items-center justify-center md:gap-1.5 shadow-sm">
                                                                            <span className="md:hidden">D{dayNum}</span>
                                                                            <span className="hidden md:inline"><i className="fas fa-calendar-day text-xs"></i> Dia {dayNum}</span>
                                                                        </button>
                                                                    );
                                                                }
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Days Views */}
                            {['dia1', 'dia2', 'dia3', 'dia4'].map(day => (
                                activeTab === day && (
                                    <div key={day} className="fade-in relative timeline-container pb-8 md:pb-12">
                                        <div className="text-center mb-10 md:mb-16">
                                            <h2 className="text-3xl md:text-4xl font-serif font-bold text-slate-800">Roteiro: Dia {day.replace('dia', '')}</h2>
                                            <div className="w-16 md:w-20 h-1 bg-gradient-to-r from-ocean-light to-ocean mx-auto mt-3 md:mt-4 rounded-full"></div>
                                        </div>
                                        
                                        {itinerary[day].length === 0 ? (
                                            <div className="text-center py-12 md:py-16 bg-white/50 rounded-2xl md:rounded-3xl border border-dashed border-slate-300 max-w-2xl mx-auto shadow-sm">
                                                <i className="fas fa-map-signs text-4xl md:text-5xl text-slate-300 mb-3 md:mb-4"></i>
                                                <h3 className="text-lg md:text-xl font-bold text-slate-600">Dia Livre</h3>
                                                <p className="text-slate-500 mb-5 md:mb-6 text-xs md:text-sm">Ainda não programou passeios para este dia.</p>
                                                <button onClick={() => setActiveTab('catalogo')} className="inline-flex items-center gap-2 bg-white border border-slate-200 text-slate-700 font-medium py-2 px-5 md:px-6 rounded-full hover:border-ocean hover:text-ocean transition-colors shadow-sm text-sm md:text-base">
                                                    <i className="fas fa-plus"></i> Adicionar
                                                </button>
                                            </div>
                                        ) : (
                                            itinerary[day].map((spot, index) => (
                                                <div key={spot.id + index} className="timeline-item relative mb-10 md:mb-16 w-full flex justify-end md:justify-center items-center pl-14 md:pl-0 fade-in" style={{animationDelay: `${index * 0.1}s`}}>
                                                    <div className={`timeline-dot absolute left-6 md:left-1/2 w-8 h-8 md:w-10 md:h-10 bg-gradient-to-br ${spot.color} rounded-full border-[3px] md:border-4 border-white shadow-lg z-10 transform -translate-x-1/2 flex items-center justify-center text-white transition-transform duration-300`}>
                                                        <i className={`fas ${spot.icon} text-sm md:text-base`}></i>
                                                    </div>
                                                    
                                                    <div className={`timeline-content w-full md:w-[45%] ${index % 2 === 0 ? 'md:mr-auto' : 'md:ml-auto'} bg-white rounded-2xl md:rounded-3xl shadow-xl hover:shadow-2xl overflow-hidden card-hover border border-white relative group`}>
                                                        <div className={`absolute -right-4 -top-4 md:-right-6 md:-top-6 text-slate-50 opacity-40 text-7xl md:text-9xl pointer-events-none transform group-hover:rotate-12 transition-transform duration-500`}><i className={`fas ${spot.icon}`}></i></div>
                                                        
                                                        <div className="relative h-44 md:h-56 overflow-hidden">
                                                            <img src={spot.img} className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" alt={spot.title}/>
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                                            <div className="absolute top-3 left-3 md:top-4 md:left-4 bg-white/95 backdrop-blur-sm px-2.5 py-1 rounded-full text-[10px] md:text-xs font-bold text-slate-700 shadow-lg flex items-center gap-1">
                                                                <i className="far fa-clock"></i> {spot.time}
                                                            </div>
                                                            <div className="absolute top-3 right-3 md:top-4 md:right-4 flex gap-1.5 md:gap-2 z-20">
                                                                <button onClick={() => setMapModal({ show: true, spot })} title="Ver no Mapa" className="bg-white/90 backdrop-blur-sm text-ocean hover:text-white w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center hover:bg-ocean transition-colors shadow-lg">
                                                                    <i className="fas fa-map-marker-alt text-sm md:text-base"></i>
                                                                </button>
                                                                <button onClick={() => requestRemoveFromDay(spot.id, day)} title="Remover" className="bg-white/90 backdrop-blur-sm text-red-500 hover:text-white w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center hover:bg-red-500 transition-colors shadow-lg">
                                                                    <i className="fas fa-times text-sm md:text-base"></i>
                                                                </button>
                                                            </div>
                                                            <h3 className="absolute bottom-3 left-4 right-4 md:bottom-4 md:left-5 md:right-5 text-lg md:text-2xl font-bold text-white text-shadow-sm leading-tight pr-20">{spot.title}</h3>
                                                        </div>
                                                        <div className="p-4 md:p-6 relative z-10 bg-white">
                                                            <p className="text-slate-600 text-xs md:text-sm leading-relaxed">{spot.desc}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )
                            ))}
                        </div>
                    </main>

                    <footer className="bg-slate-900 text-slate-400 py-8 md:py-10 text-center mt-8 md:mt-12 border-t border-slate-800 text-sm md:text-base">
                        <p className="font-light tracking-wide px-4">Desenvolvido com <i className="fas fa-heart text-coral mx-1 animate-pulse"></i> para a sua viagem a Maceió.</p>
                    </footer>

                    {/* Toast */}
                    <div className={`toast ${toast.show ? 'show' : ''} ${toast.type === 'error' ? 'error' : ''}`}>
                        <i className={`fas ${toast.type === 'error' ? 'fa-trash-alt' : 'fa-check-circle'} text-lg`}></i>
                        <span>{toast.message}</span>
                    </div>

                    {/* Clear Modal */}
                    {clearModalOpen && (
                        <div className="fixed inset-0 z-[600] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-trash-alt text-2xl text-red-500"></i>
                                </div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Limpar Roteiro?</h3>
                                <p className="text-slate-500 text-sm mb-6">Esta ação irá remover todos os passeios já planeados nos dias. Esta ação não poderá ser desfeita.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setClearModalOpen(false)} className="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                                    <button onClick={confirmClearItinerary} className="flex-1 bg-red-500 text-white font-semibold py-2.5 rounded-xl hover:bg-red-600 transition-colors shadow-md shadow-red-500/30">Sim, Limpar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Remove Item Modal */}
                    {removeModal.show && (
                        <div className="fixed inset-0 z-[600] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-times text-2xl text-red-500"></i>
                                </div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Remover Passeio?</h3>
                                <p className="text-slate-500 text-sm mb-6">Deseja remover este passeio do Dia {removeModal.dayId?.replace('dia', '')}?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setRemoveModal({ show: false, spotId: null, dayId: null })} className="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                                    <button onClick={confirmRemoveFromDay} className="flex-1 bg-red-500 text-white font-semibold py-2.5 rounded-xl hover:bg-red-600 transition-colors shadow-md shadow-red-500/30">Sim, Remover</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Map Modal */}
                    <MapModal config={mapModal} onClose={() => setMapModal({ show: false, spot: null })} />

                    {/* PWA Banner */}
                    {pwaBanner.show && (
                        <div className="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-[350px] bg-white rounded-2xl shadow-2xl z-[500] flex flex-col overflow-hidden border border-slate-100 fade-in">
                            <div className="bg-gradient-to-r from-ocean to-ocean-dark p-4 flex justify-between items-center text-white">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 w-10 h-10 flex items-center justify-center rounded-xl backdrop-blur-sm"><i className="fas fa-plane-departure text-xl"></i></div>
                                    <div>
                                        <h4 className="font-bold text-sm">Instalar Planeador</h4>
                                        <p className="text-[10px] text-white/80">Acesso rápido no seu ecrã inicial</p>
                                    </div>
                                </div>
                            </div>
                            <div className="p-4 bg-white flex justify-end gap-3">
                                <button onClick={dismissPWA} className="text-slate-500 hover:text-slate-700 font-medium px-3 py-1.5 text-xs transition-colors rounded-lg">Mais Tarde</button>
                                {pwaBanner.mode === null && (
                                    <button onClick={handleInstall} className="bg-ocean hover:bg-ocean-dark text-white font-bold px-5 py-2 rounded-xl text-xs shadow-md transition-colors flex items-center gap-2">
                                        <i className="fas fa-download"></i> Instalar App
                                    </button>
                                )}
                            </div>
                            
                            {pwaBanner.mode === 'ios' && (
                                <div className="p-4 bg-slate-50 text-xs text-slate-600 border-t border-slate-100 leading-relaxed text-center fade-in">
                                    <p>Para instalar no iPhone/iPad: <br/>Toque no ícone <i className="fas fa-share-square text-ocean mx-1 text-base"></i> <strong>Partilhar</strong> na barra do navegador e selecione <br/><strong>"Adicionar ao Ecrã Principal"</strong>.</p>
                                </div>
                            )}
                            
                            {pwaBanner.mode === 'android' && (
                                <div className="p-4 bg-slate-50 text-xs text-slate-600 border-t border-slate-100 leading-relaxed text-center fade-in">
                                    <p>Para instalar no Android: <br/>Toque no menu <i className="fas fa-ellipsis-v text-ocean mx-1 text-base"></i> (três pontos) no canto superior direito e selecione <br/><strong>"Adicionar ao Ecrã Principal"</strong> ou <strong>"Instalar Aplicação"</strong>.</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Componente do Mapa Isolado
        const MapModal = ({ config, onClose }) => {
            const mapRef = useRef(null);

            useEffect(() => {
                let mapInstance = null;

                if (config.show && config.spot && mapRef.current) {
                    // Inicializa o mapa com o novo elemento DOM
                    mapInstance = L.map(mapRef.current).setView([config.spot.lat, config.spot.lng], 16);
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(mapInstance);

                    L.marker([config.spot.lat, config.spot.lng])
                        .addTo(mapInstance)
                        .bindPopup(`<b>${config.spot.title}</b><br>O seu destino.`)
                        .openPopup();

                    if ("geolocation" in navigator) {
                        navigator.geolocation.getCurrentPosition(position => {
                            const userLat = position.coords.latitude;
                            const userLng = position.coords.longitude;
                            
                            const userIcon = L.divIcon({
                                className: 'custom-user-icon',
                                html: '<div style="background-color: #3b82f6; width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>',
                                iconSize: [14, 14],
                                iconAnchor: [7, 7]
                            });

                            L.marker([userLat, userLng], {icon: userIcon})
                                .addTo(mapInstance)
                                .bindPopup('<b>Você</b><br>A sua localização atual.');
                        }, err => {
                            console.log("Localização indisponível.");
                        });
                    }

                    // Força o recálculo do tamanho do mapa após a animação do modal terminar para evitar fundo cinzento
                    const timerAnim = setTimeout(() => {
                        if (mapInstance) {
                            mapInstance.invalidateSize();
                        }
                    }, 400);

                    return () => {
                        clearTimeout(timerAnim);
                        if (mapInstance) {
                            mapInstance.remove(); // Limpa a instância do Leaflet corretamente ao fechar
                        }
                    };
                }
            }, [config]);

            if (!config.show || !config.spot) return null;

            return (
                <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm flex items-center justify-center p-3 sm:p-4 fade-in">
                    <div className="bg-white rounded-2xl md:rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col md:flex-row h-[90vh] md:h-[75vh] relative">
                        <button onClick={onClose} className="absolute top-3 right-3 md:top-4 md:right-4 z-[400] bg-white text-slate-700 hover:text-red-500 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center shadow-lg transition-colors border border-slate-100">
                            <i className="fas fa-times md:text-lg"></i>
                        </button>
                        <div className="w-full md:w-1/3 h-40 md:h-full relative flex-shrink-0">
                            <img src={config.spot.img} className="w-full h-full object-cover" alt="Local" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 md:via-black/30 to-transparent"></div>
                            <div className="absolute bottom-4 left-4 right-4 md:bottom-6 md:left-6 md:right-6 text-white">
                                <h3 className="text-xl md:text-2xl font-bold mb-1 md:mb-2 text-shadow-sm leading-tight pr-8">{config.spot.title}</h3>
                                <p className="text-xs md:text-sm opacity-90 leading-relaxed hidden sm:block">{config.spot.desc}</p>
                            </div>
                        </div>
                        <div className="w-full md:w-2/3 h-full relative z-10 bg-slate-100" ref={mapRef}>
                            {/* Leaflet será renderizado aqui */}
                        </div>
                    </div>
                </div>
            );
        };

        // Renderizar a App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
